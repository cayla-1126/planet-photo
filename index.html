<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Photos</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <style>
        :root { --accent: #ffc0cb; }
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "PingFang SC", sans-serif; color: white; }
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #0d0d2b 0%, #000 100%); display: flex; justify-content: center; align-items: center; z-index: 1000; transition: opacity 1s; }
        .glass-card { text-align: center; width: 100%; max-width: 600px; padding: 20px; }
        .glow-text { font-size: 3rem; letter-spacing: 10px; font-weight: 200; margin-bottom: 30px; }
        #planet-name { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.3); color: white; font-size: 1.5rem; text-align: center; outline: none; width: 280px; letter-spacing: 5px; margin-bottom: 30px; }
        
        .preview-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .preview-slot { width: 60px; height: 60px; border: 1px dashed rgba(255,255,255,0.2); border-radius: 50%; cursor: pointer; position: relative; overflow: hidden; }
        .preview-slot img { width: 100%; height: 100%; object-fit: cover; }
        .preview-slot.filled:hover::after { content: "✕"; position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }

        #fake-upload-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; color: white; cursor: pointer; border-radius: 20px; }
        .main-btn { margin-top: 20px; padding: 12px 50px; background: transparent; border: 1px solid var(--accent); color: white; font-size: 1.2rem; cursor: pointer; opacity: 0; pointer-events: none; transition: 0.5s; }
        .main-btn.visible { opacity: 1; pointer-events: auto; }

        #instructions { position: fixed; right: 30px; bottom: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
        .ins-node { font-size: 14px; color: rgba(255,255,255,0.8); text-shadow: 0 0 8px white; }

        #photo-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000; }
        #close-btn { position: absolute; top: 20px; right: 30px; font-size: 50px; cursor: pointer; }
        #full-res-img { max-width: 90%; max-height: 90%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="glass-card">
            <h1 class="glow-text">Planet Photos</h1>
            <input type="text" id="planet-name" placeholder="星球命名" maxlength="15">
            <div class="preview-container" id="preview-box"></div>
            <button id="fake-upload-btn">＋ 注入记忆 (5-10张)</button>
            <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
            <div id="upload-status" style="margin-top:10px">0 / 10</div>
            <button id="start-btn" class="main-btn">开启星径</button>
        </div>
    </div>
    <div id="instructions" style="display: none;">
        <div class="ins-node">☝️ 拨动星尘</div>
        <div class="ins-node">🖐️ 触及回忆</div>
        <div class="ins-node">✊ 远观星系</div>
    </div>
    <div id="photo-overlay"><div id="close-btn">×</div><img id="full-res-img"></div>
    <div id="container"></div>
    <video class="input_video" style="display:none" playsinline></video>

    <script type="module" src="main.js"></script>
    <script>
        let uploadedImages = [];
        const previewBox = document.getElementById('preview-box');
        const realInput = document.getElementById('file-input');
        const startBtn = document.getElementById('start-btn');

        // 初始化10个槽位
        for(let i=0; i<10; i++) {
            const div = document.createElement('div');
            div.className = 'preview-slot';
            div.onclick = () => removeImg(i);
            previewBox.appendChild(div);
        }

        document.getElementById('fake-upload-btn').onclick = () => realInput.click();
        realInput.onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                if (uploadedImages.length < 10) {
                    const r = new FileReader();
                    r.onload = (ev) => { uploadedImages.push(ev.target.result); updateUI(); };
                    r.readAsDataURL(file);
                }
            });
            realInput.value = '';
        };

        window.removeImg = (i) => { if(uploadedImages[i]) { uploadedImages.splice(i,1); updateUI(); }};
        function updateUI() {
            const slots = document.querySelectorAll('.preview-slot');
            slots.forEach((s, i) => {
                s.innerHTML = uploadedImages[i] ? `<img src="${uploadedImages[i]}">` : '';
                s.className = uploadedImages[i] ? 'preview-slot filled' : 'preview-slot';
            });
            document.getElementById('upload-status').innerText = `${uploadedImages.length} / 10`;
            uploadedImages.length >= 5 ? startBtn.classList.add('visible') : startBtn.classList.remove('visible');
        }
        startBtn.onclick = () => { window.finalPhotos = uploadedImages; localStorage.setItem('userPlanetName', document.getElementById('planet-name').value || "KLA"); };
        document.getElementById('close-btn').onclick = () => document.getElementById('photo-overlay').style.display = 'none';
    </script>
</body>
</html>
